name: Validate Bash

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Check syntax
        run: find src -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n
      - name: Run ShellCheck
        run: find src -type f -name '*.sh' -print0 | xargs -0 -r shellcheck
